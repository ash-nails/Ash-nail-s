<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Nail's</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c8ab6e;
--gold2:#e7d5a7;
--bg:#0b0b0b;
--card:rgba(20,20,20,0.75);
--text:#f4f4f4;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:radial-gradient(circle at top,#111,#050505);
color:var(--text);
}

.container{
max-width:460px;
margin:auto;
padding:20px 16px 80px;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:44px;
text-align:center;
color:var(--gold2);
}

.subtitle{
text-align:center;
color:#aaa;
font-size:13px;
margin-bottom:18px;
}

.card{
background:var(--card);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.05);
border-radius:22px;
padding:16px;
margin-bottom:14px;
}

.section-title{
font-size:11px;
letter-spacing:2px;
color:var(--gold);
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
padding:14px;
background:rgba(255,255,255,0.03);
border-radius:16px;
text-align:center;
font-size:13px;
cursor:pointer;
transition:.2s;
}

.option.active{
background:linear-gradient(145deg,var(--gold),var(--gold2));
color:#111;
font-weight:600;
}

.price{
font-size:11px;
color:#aaa;
margin-top:4px;
}

.decor{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:rgba(255,255,255,0.03);
border-radius:14px;
margin-bottom:8px;
}

.counter button{
width:30px;
height:30px;
border-radius:50%;
border:1px solid var(--gold);
background:transparent;
color:var(--gold2);
font-size:18px;
cursor:pointer;
}

.counter span{
margin:0 10px;
}

.total{
text-align:center;
font-size:34px;
margin-top:10px;
color:var(--gold2);
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:999px;
margin-top:12px;
background:linear-gradient(145deg,var(--gold),#f2e4be);
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Ash Nail's</div>
<div class="subtitle">Diseño de uñas premium ✨</div>

<!-- TECNICAS -->
<div class="card">
<div class="section-title">TÉCNICA</div>

<div class="grid">

<div class="option" onclick="setTech(this,'Manicuría',8000,false)">
Manicuría
<div class="price">$8000</div>
</div>

<div class="option" onclick="setTech(this,'Semipermanente',10000,true)">
Semipermanente
<div class="price">$10000</div>
</div>

<div class="option" onclick="setTech(this,'Rubber Gel',12000,true)">
Rubber Gel
<div class="price">$12000</div>
</div>

<div class="option" onclick="setTech(this,'Capping',13000,true)">
Capping
<div class="price">$13000</div>
</div>

</div>
</div>

<!-- DECORACIONES SOLO SI CORRESPONDE -->
<div class="card" id="decoCard" style="display:none">

<div class="section-title">DECORACIONES</div>

<div class="decor">
Glitter $200
<div class="counter">
<button onclick="minus('glitter')">-</button>
<span id="glitter">0</span>
<button onclick="plus('glitter')">+</button>
</div>
</div>

<div class="decor">
Frances $200
<div class="counter">
<button onclick="minus('frances')">-</button>
<span id="frances">0</span>
<button onclick="plus('frances')">+</button>
</div>
</div>

<div class="decor">
Strass $100
<div class="counter">
<button onclick="minus('strass')">-</button>
<span id="strass">0</span>
<button onclick="plus('strass')">+</button>
</div>
</div>

</div>

<button class="btn" onclick="calc()">Calcular 💅</button>

<div class="total" id="total">$0</div>

</div>

<script>

let techPrice=0;

const prices={
glitter:200,
frances:200,
strass:100
};

function setTech(el,name,price,showDeco){

document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
el.classList.add('active');

techPrice=price;

document.getElementById('decoCard').style.display = showDeco ? 'block':'none';
}

/* + - */
function plus(id){
document.getElementById(id).innerText++;
}

function minus(id){
let el=document.getElementById(id);
if(el.innerText>0) el.innerText--;
}

/* calcular */
function calc(){

let total=techPrice;

for(let k in prices){
total += document.getElementById(k).innerText * prices[k];
}

document.getElementById('total').innerText="$"+total;
}

</script>

</body>
</html>
