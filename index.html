<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Nail's</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c8ab6e;
--gold2:#e7d5a7;
}

body{
margin:0;
font-family:Montserrat;
background:linear-gradient(to bottom,#050505,#111);
color:white;
overflow-x:hidden;
}

/* 🦋 MARIPOSAS */
.butterfly{
position:fixed;
font-size:60px;
opacity:.25;
animation:float 6s infinite ease-in-out;
pointer-events:none;
}

.b1{top:60px;left:10px;}
.b2{top:300px;right:10px;animation-delay:2s;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

.container{
max-width:460px;
margin:auto;
padding:20px;
}

.logo{
text-align:center;
font-size:42px;
font-family:Cormorant Garamond;
color:var(--gold2);
animation:fadeDown .6s ease;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-10px);}
to{opacity:1;transform:translateY(0);}
}

.card{
background:#131313;
padding:16px;
border-radius:18px;
margin-top:14px;
animation:fadeUp .4s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.title{
color:var(--gold);
font-size:12px;
letter-spacing:2px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
background:#1b1b1b;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:.25s;
}

.option:hover{
transform:scale(1.03);
}

.option.active{
background:linear-gradient(145deg,var(--gold),var(--gold2));
color:#111;
font-weight:bold;
}

.price{
font-size:11px;
opacity:.7;
margin-top:4px;
}

/* DECOR */
.decor{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1b1b1b;
border-radius:12px;
margin-bottom:8px;
}

.counter button{
width:28px;
height:28px;
border-radius:50%;
border:1px solid var(--gold);
background:transparent;
color:var(--gold2);
font-size:16px;
cursor:pointer;
}

.counter span{
margin:0 8px;
}

/* BOTON */
.calc{
width:100%;
padding:14px;
border:none;
border-radius:999px;
background:linear-gradient(var(--gold),var(--gold2));
font-weight:bold;
margin-top:12px;
cursor:pointer;
transition:.2s;
}

.calc:active{
transform:scale(.97);
}

/* TOTAL */
.total{
text-align:center;
font-size:34px;
margin-top:10px;
color:var(--gold2);
}

/* LARGOS */
.hidden{display:none;}

</style>
</head>

<body>

<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>

<div class="container">

<div class="logo">Ash Nail's</div>

<!-- TECNICAS -->
<div class="card">
<div class="title">TÉCNICA</div>

<div class="grid">

<div class="option" onclick="selectTech(this,'Manicuría',8000,false)">Manicuría<div class="price">$8000</div></div>

<div class="option" onclick="selectTech(this,'Semipermanente',10000,true)">Semipermanente<div class="price">$10000</div></div>

<div class="option" onclick="selectTech(this,'Rubber Gel',12000,true)">Rubber Gel<div class="price">$12000</div></div>

<div class="option" onclick="selectTech(this,'Capping',13000,true)">Capping<div class="price">$13000</div></div>

<div class="option" onclick="selectTech(this,'Soft Acrílico',15000,true)">Soft Acrílico<div class="price">$15000</div></div>

</div>
</div>

<!-- LARGOS SOLO SOFT -->
<div class="card hidden" id="lengthCard">

<div class="title">LARGO</div>

<div class="grid">

<div class="option" onclick="setLength(this,'S',15000)">S<div class="price">$15000</div></div>
<div class="option" onclick="setLength(this,'M',18000)">M<div class="price">$18000</div></div>
<div class="option" onclick="setLength(this,'L',22000)">L<div class="price">$22000</div></div>
<div class="option" onclick="setLength(this,'XL',25000)">XL<div class="price">$25000</div></div>

</div>
</div>

<!-- DECOR -->
<div class="card hidden" id="deco">

<div class="title">DECORACIONES</div>

<div class="decor">Glitter $200
<div class="counter"><button onclick="minus('glitter')">-</button><span id="glitter">0</span><button onclick="plus('glitter')">+</button></div>
</div>

<div class="decor">Frances $200
<div class="counter"><button onclick="minus('frances')">-</button><span id="frances">0</span><button onclick="plus('frances')">+</button></div>
</div>

<div class="decor">Strass $100
<div class="counter"><button onclick="minus('strass')">-</button><span id="strass">0</span><button onclick="plus('strass')">+</button></div>
</div>

</div>

<button class="calc" onclick="calc()">Calcular 💅</button>

<div class="total" id="total">$0</div>

</div>

<script>

let base=0;
let lengthPrice=0;

const prices={
glitter:200,
frances:200,
strass:100
};

function selectTech(el,name,price,show){

document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
el.classList.add('active');

base=price;

document.getElementById('deco').classList.toggle('hidden',!show);
document.getElementById('lengthCard').classList.toggle('hidden',name!=='Soft Acrílico');
}

function setLength(el,name,price){

document.querySelectorAll('#lengthCard .option').forEach(o=>o.classList.remove('active'));
el.classList.add('active');

lengthPrice=price;
}

function plus(id){
document.getElementById(id).innerText++;
}

function minus(id){
let el=document.getElementById(id);
if(el.innerText>0) el.innerText--;
}

function calc(){

let total=base;

if(lengthPrice) total=lengthPrice;

for(let k in prices){
total += document.getElementById(k).innerText * prices[k];
}

document.getElementById('total').innerText="$"+total;
}

</script>

</body>
</html>
