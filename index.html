<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Nail's</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap');

:root{
--gold:#c6a96b;
--gold2:#e8d8a3;
--bg:#0a0a0a;
--card:#111;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--bg);
color:#fff;
overflow-x:hidden;
}

/* ✨ brillo sutil */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(198,169,107,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(198,169,107,0.08), transparent 40%);
z-index:-1;
}

/* 🦋 mariposas */
.butterfly{
position:fixed;
font-size:18px;
opacity:0.6;
animation:float 6s infinite ease-in-out;
}
.b1{top:10%; left:5%;}
.b2{top:70%; right:5%;}
@keyframes float{
50%{transform:translateY(-10px);}
}

/* ✨ glitter */
.sparkle{
position:fixed;
width:4px;
height:4px;
background:var(--gold);
border-radius:50%;
opacity:0.7;
animation:fall 5s linear infinite;
}
@keyframes fall{
0%{transform:translateY(-10px);}
100%{transform:translateY(100vh);}
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{
font-family:'Playfair Display';
text-align:center;
color:var(--gold);
}

.section{margin-bottom:25px;}

.title{
color:var(--gold);
font-size:13px;
letter-spacing:2px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
padding:12px;
border-radius:16px;
border:1px solid rgba(198,169,107,0.25);
background:var(--card);
color:#fff;
font-size:13px;
}

.btn.active{
background:linear-gradient(145deg,var(--gold),var(--gold2));
color:#000;
box-shadow:0 0 10px rgba(198,169,107,0.5);
}

input,select{
width:100%;
padding:10px;
border-radius:12px;
border:none;
background:#111;
color:#fff;
margin-top:8px;
}

.mainBtn{
margin-top:15px;
padding:14px;
border:none;
border-radius:25px;
background:linear-gradient(145deg,var(--gold),var(--gold2));
color:#000;
font-weight:bold;
width:100%;
}

.result{
text-align:center;
margin-top:10px;
font-size:22px;
color:var(--gold);
}

.resumen{
background:#111;
padding:10px;
border-radius:12px;
font-size:13px;
margin-top:10px;
color:#ddd;
}

.note{
font-size:12px;
text-align:center;
color:#aaa;
margin-top:10px;
}
</style>
</head>

<body>

<!-- 🦋 -->
<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>

<!-- ✨ glitter -->
<script>
for(let i=0;i<15;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(s);
}
</script>

<div class="container">

<h1>🖤 Ash Nail's ✨</h1>

<div class="section">
<div class="title">TÉCNICA</div>
<div class="grid" id="tec">
<div class="btn" onclick="sel(this,'Manicuría',8000)">Manicuría</div>
<div class="btn" onclick="sel(this,'Semipermanente',10000)">Semi</div>
<div class="btn" onclick="sel(this,'Rubber',12000)">Rubber</div>
<div class="btn" onclick="sel(this,'Capping',13000)">Capping</div>
<div class="btn" onclick="sel(this,'Soft',0)">Soft</div>
</div>
</div>

<div class="section" id="largoBox">
<div class="title">LARGO</div>
<div class="grid" id="lar">
<div class="btn" onclick="selL(this,'S',15000)">S</div>
<div class="btn" onclick="selL(this,'M',18000)">M</div>
<div class="btn" onclick="selL(this,'L',22000)">L</div>
<div class="btn" onclick="selL(this,'XL',25000)">XL</div>
</div>
</div>

<div class="section" id="extraBox">
<div class="title">DECORACIONES</div>
<input id="cant" placeholder="Cantidad de uñas">
<div class="grid" id="ext">
<div class="btn" onclick="toggleExtra(this,'Glitter',200)">Glitter</div>
<div class="btn" onclick="toggleExtra(this,'Strass',100)">Strass</div>
<div class="btn" onclick="toggleExtra(this,'Frances',200)">Frances</div>
<div class="btn" onclick="toggleExtra(this,'Relieve',500)">Relieve</div>
</div>
</div>

<button class="mainBtn" onclick="calc()">Calcular 💅</button>

<div class="result" id="res"></div>
<div class="resumen" id="detalle"></div>

<div class="section">
<div class="title">RESERVAR</div>

<input id="nombre" placeholder="Tu nombre">
<input type="date" id="fecha">

<select id="hora"></select>

<p class="note">Seña 50% 💖</p>

<button class="mainBtn" onclick="enviar()">Agendar 💬</button>
</div>

</div>

<script>
let tecnica="",precioTec=0;
let largo="",precioLargo=0;
let extras=[];
let horarios=["10:00","11:30","13:00","14:30","16:00","17:30"];
let diasBloqueados=[0]; // domingo

function cargarHoras(){
horarios.forEach(h=>{
let o=document.createElement("option");
o.text=h;
hora.add(o);
});
}

function sel(el,n,p){
document.querySelectorAll("#tec .btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
tecnica=n;
precioTec=p;

if(n==="Manicuría"){
extraBox.style.display="none";
largoBox.style.display="none";
}else if(n==="Soft"){
largoBox.style.display="block";
extraBox.style.display="block";
}else{
largoBox.style.display="none";
extraBox.style.display="block";
}
}

function selL(el,n,p){
document.querySelectorAll("#lar .btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
largo=n;
precioLargo=p;
}

function toggleExtra(el,n,p){
el.classList.toggle("active");
let ex=extras.find(e=>e.n===n);
if(ex){extras=extras.filter(e=>e.n!==n);}
else{extras.push({n,p});}
}

function calc(){
let c=parseInt(cant.value)||0;
let total=(precioTec===0?precioLargo:precioTec);
extras.forEach(e=> total+=e.p*c);

res.innerText="$"+total;

let txt="💅 "+tecnica+"\n";
if(largo) txt+="📏 "+largo+"\n";
if(extras.length>0){
txt+="✨ ";
extras.forEach(e=>txt+=e.n+", ");
}
txt+="\n💰 $"+total;

detalle.innerText=txt;
window.total=total;
window.detalle=txt;
}

function enviar(){
let f=new Date(fecha.value);
if(diasBloqueados.includes(f.getDay())){
alert("Ese día no trabajo 🦋");
return;
}

let msg="Hola Aye 💅\n"+nombre.value+
"\n📅 "+fecha.value+
"\n⏰ "+hora.value+
"\n\n"+window.detalle+
"\n\nSeña 50% 💖";

window.open("https://wa.me/5491168071677?text="+encodeURIComponent(msg));
}

cargarHoras();
</script>

</body>
</html>
