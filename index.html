<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Nail's</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c8ab6e;
--gold2:#e7d5a7;
--bg:#0b0b0b;
--card:rgba(20,20,20,0.75);
--text:#f4f4f4;
--blur:blur(14px);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:radial-gradient(circle at top,#111,#050505);
color:var(--text);
overflow-x:hidden;
}

/* glow background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(200,171,110,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(200,171,110,0.10), transparent 45%);
pointer-events:none;
}

.container{
max-width:460px;
margin:auto;
padding:22px 16px 80px;
}

.logo{
font-family:'Cormorant Garamond',serif;
font-size:44px;
text-align:center;
color:var(--gold2);
letter-spacing:1px;
animation:fadeDown .8s ease;
}

.subtitle{
text-align:center;
color:#aaa;
font-size:13px;
margin-top:-6px;
margin-bottom:18px;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-10px);}
to{opacity:1;transform:translateY(0);}
}

.card{
background:var(--card);
backdrop-filter:var(--blur);
border:1px solid rgba(255,255,255,0.05);
border-radius:22px;
padding:16px;
margin-bottom:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
animation:fadeUp .5s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(12px);}
to{opacity:1;transform:translateY(0);}
}

.section-title{
font-size:11px;
letter-spacing:2px;
color:var(--gold);
margin-bottom:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
padding:14px;
background:rgba(255,255,255,0.03);
border-radius:16px;
text-align:center;
font-size:13px;
cursor:pointer;
transition:.25s ease;
position:relative;
overflow:hidden;
}

.option:hover{
transform:translateY(-2px) scale(1.02);
}

.option:active{
transform:scale(0.96);
}

.option.active{
background:linear-gradient(145deg,var(--gold),var(--gold2));
color:#111;
font-weight:600;
transform:scale(1.05);
box-shadow:0 10px 25px rgba(200,171,110,0.25);
}

.decor{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:rgba(255,255,255,0.03);
border-radius:14px;
margin-bottom:8px;
transition:.2s;
}

.decor:hover{
transform:translateX(3px);
}

.counter button{
width:30px;
height:30px;
border-radius:50%;
border:1px solid var(--gold);
background:transparent;
color:var(--gold2);
font-size:18px;
cursor:pointer;
transition:.2s;
position:relative;
overflow:hidden;
}

.counter span{
margin:0 8px;
}

.counter button:active{
transform:scale(0.85);
}

.total{
text-align:center;
font-size:34px;
margin-top:10px;
color:var(--gold2);
animation:fadeUp .4s ease;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:999px;
margin-top:12px;
background:linear-gradient(145deg,var(--gold),#f2e4be);
font-weight:600;
cursor:pointer;
position:relative;
overflow:hidden;
transition:.3s;
}

.btn:hover{
transform:scale(1.02);
box-shadow:0 12px 30px rgba(200,171,110,0.3);
}

.btn:active{
transform:scale(0.97);
}

/* RIPPLE */
.ripple{
position:absolute;
border-radius:50%;
transform:scale(0);
animation:ripple .6s ease-out;
background:rgba(255,255,255,0.35);
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Ash Nail's</div>
<div class="subtitle">Tu experiencia de uñas premium ✨</div>

<div class="card">
<div class="section-title">TÉCNICA</div>

<div class="grid">
<div class="option" onclick="selectTech(this,'Manicuría',8000)">Manicuría</div>
<div class="option" onclick="selectTech(this,'Semipermanente',10000)">Semipermanente</div>
<div class="option" onclick="selectTech(this,'Rubber Gel',12000)">Rubber Gel</div>
<div class="option" onclick="selectTech(this,'Capping',13000)">Capping</div>
</div>
</div>

<div class="card" id="decoCard" style="display:none">

<div class="section-title">DECORACIONES</div>

<div class="decor">
Glitter
<div class="counter">
<button onclick="minus('glitter')">-</button>
<span id="glitter">0</span>
<button onclick="plus('glitter')">+</button>
</div>
</div>

<div class="decor">
Frances
<div class="counter">
<button onclick="minus('frances')">-</button>
<span id="frances">0</span>
<button onclick="plus('frances')">+</button>
</div>
</div>

</div>

<button class="btn" onclick="calc(event)">Calcular presupuesto 💅</button>

<div class="total" id="total">$0</div>

</div>

<script>

let techPrice=0;

const prices={
glitter:200,
frances:200
};

function selectTech(el,name,price){
document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
el.classList.add('active');

techPrice=price;
document.getElementById('decoCard').style.display='block';
}

/* counters */
function plus(id){
document.getElementById(id).innerText++;
}

function minus(id){
let el=document.getElementById(id);
if(el.innerText>0) el.innerText--;
}

/* calc */
function calc(e){

ripple(e);

let total=techPrice;

for(let k in prices){
total += document.getElementById(k).innerText * prices[k];
}

document.getElementById('total').innerText="$"+total;
}

/* ripple effect */
function ripple(e){
const btn=e.currentTarget;

const circle=document.createElement("span");
const size=Math.max(btn.clientWidth,btn.clientHeight);

circle.style.width=circle.style.height=size+"px";
circle.style.left=e.clientX-btn.offsetLeft-size/2+"px";
circle.style.top=e.clientY-btn.offsetTop-size/2+"px";

circle.classList.add("ripple");

btn.appendChild(circle);

setTimeout(()=>circle.remove(),600);
}

</script>

</body>
</html>
