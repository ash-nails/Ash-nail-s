<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Nail's</title>

<style>
body{
margin:0;
font-family:Poppins, sans-serif;
background:#0f0f0f;
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#c6a96b;
}

.section{
margin-bottom:20px;
}

.title{
color:#c6a96b;
margin-bottom:10px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn{
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#1a1a1a;
text-align:center;
cursor:pointer;
}

.btn.active{
background:#c6a96b;
color:black;
}

input, select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:white;
}

.main{
background:#c6a96b;
color:black;
border:none;
padding:12px;
border-radius:20px;
width:100%;
margin-top:10px;
}

.result{
text-align:center;
font-size:22px;
color:#c6a96b;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Ash Nail's 💅</h1>

<div class="section">
<div class="title">Técnica</div>
<div class="grid" id="tec">
<div class="btn" onclick="selectTec(this,'manicuria',8000)">Manicuría</div>
<div class="btn" onclick="selectTec(this,'semi',10000)">Semi</div>
<div class="btn" onclick="selectTec(this,'rubber',12000)">Rubber</div>
<div class="btn" onclick="selectTec(this,'capping',13000)">Capping</div>
<div class="btn" onclick="selectTec(this,'soft',0)">Soft</div>
</div>
</div>

<div class="section" id="largoBox">
<div class="title">Largo (Soft)</div>
<div class="grid" id="lar">
<div class="btn" onclick="selectLargo(this,15000)">S</div>
<div class="btn" onclick="selectLargo(this,18000)">M</div>
<div class="btn" onclick="selectLargo(this,22000)">L</div>
<div class="btn" onclick="selectLargo(this,25000)">XL</div>
</div>
</div>

<div class="section" id="extraBox">
<div class="title">Decoraciones</div>

<input id="cant" type="number" placeholder="Cantidad de uñas">

<select id="extra">
<option value="0">Sin decoración</option>
<option value="100">Espejo</option>
<option value="500">Sueter</option>
<option value="200">Glitter</option>
<option value="100">Blooming</option>
<option value="200">Ojo de gato</option>
<option value="500">Relieve</option>
<option value="200">Frances</option>
<option value="300">Nail art</option>
<option value="300">Encapsulado</option>
<option value="100">Strass</option>
<option value="100">Sticker</option>
<option value="300">Baby boomer</option>
</select>

</div>

<select id="extra2">
<option value="0">Sin extras</option>
<option value="1000">Cambio de forma</option>
<option value="3000">Retiro propio</option>
<option value="4500">Retiro colega</option>
<option value="2000">Retiro semi</option>
</select>

<input id="repo" type="number" placeholder="Reposiciones (por uña)">

<button class="main" onclick="calcular()">Calcular</button>

<div class="result" id="total"></div>

<div class="section">
<div class="title">Reservar</div>

<input id="nombre" placeholder="Tu nombre">
<input id="fecha" type="date">
<input id="hora" type="time">

<button class="main" onclick="enviar()">WhatsApp</button>
</div>

</div>

<script>
let tecnica=0;
let largo=0;

function selectTec(el,nombre,precio){
document.querySelectorAll("#tec .btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
tecnica=precio;

if(nombre==="manicuria"){
extraBox.style.display="none";
largoBox.style.display="none";
}else if(nombre==="soft"){
largoBox.style.display="block";
extraBox.style.display="block";
}else{
largoBox.style.display="none";
extraBox.style.display="block";
}
}

function selectLargo(el,precio){
document.querySelectorAll("#lar .btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
largo=precio;
}

function calcular(){
let e=parseInt(extra.value);
let c=parseInt(cant.value)||0;
let e2=parseInt(extra2.value);
let r=parseInt(repo.value)||0;

let total=(tecnica===0?largo:tecnica)+(e*c)+e2+(r*1000);

document.getElementById("total").innerText="$"+total;
window.total=total;
}

function enviar(){
if(!nombre.value||!fecha.value||!window.total){
alert("Completá todo");
return;
}

let msg="Hola Aye 💅\n"+nombre.value+
"\n📅 "+fecha.value+
"\n⏰ "+hora.value+
"\n💰 Total: $"+window.total;

window.open("https://wa.me/5491168071677?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
