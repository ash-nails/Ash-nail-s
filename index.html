<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Nail's</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Montserrat;
background:#0b0b0b;
color:#fff;
}

.container{
max-width:460px;
margin:auto;
padding:20px;
}

.logo{
text-align:center;
font-size:42px;
color:#e7d5a7;
font-family:Cormorant Garamond;
}

.card{
background:#131313;
padding:16px;
border-radius:18px;
margin-top:14px;
}

.title{
color:#c8ab6e;
font-size:12px;
letter-spacing:2px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
background:#1b1b1b;
padding:14px;
border-radius:14px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.option.active{
background:#e7d5a7;
color:#111;
font-weight:bold;
}

.price{
font-size:11px;
opacity:.7;
margin-top:4px;
}

.decor{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1b1b1b;
border-radius:12px;
margin-bottom:8px;
}

.counter button{
width:28px;
height:28px;
border-radius:50%;
border:1px solid #c8ab6e;
background:transparent;
color:#e7d5a7;
font-size:16px;
cursor:pointer;
}

.counter span{
margin:0 8px;
}

.total{
text-align:center;
font-size:34px;
margin-top:10px;
color:#e7d5a7;
}

button.calc{
width:100%;
padding:14px;
border:none;
border-radius:999px;
background:linear-gradient(#c8ab6e,#e7d5a7);
font-weight:bold;
margin-top:12px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">Ash Nail's</div>

<!-- TECNICAS -->
<div class="card">
<div class="title">TÉCNICA</div>

<div class="grid">

<div class="option" onclick="selectTech(this,'Manicuría',8000,false)">Manicuría<div class="price">$8000</div></div>

<div class="option" onclick="selectTech(this,'Semipermanente',10000,true)">Semipermanente<div class="price">$10000</div></div>

<div class="option" onclick="selectTech(this,'Rubber Gel',12000,true)">Rubber Gel<div class="price">$12000</div></div>

<div class="option" onclick="selectTech(this,'Capping',13000,true)">Capping<div class="price">$13000</div></div>

<div class="option" onclick="selectTech(this,'Soft Acrílico',15000,true)">Soft Acrílico<div class="price">$15000</div></div>

</div>
</div>

<!-- DECORACIONES -->
<div class="card" id="deco" style="display:none">

<div class="title">DECORACIONES</div>

<div class="decor">Glitter $200
<div class="counter">
<button onclick="minus('glitter')">-</button>
<span id="glitter">0</span>
<button onclick="plus('glitter')">+</button>
</div></div>

<div class="decor">Frances $200
<div class="counter">
<button onclick="minus('frances')">-</button>
<span id="frances">0</span>
<button onclick="plus('frances')">+</button>
</div></div>

<div class="decor">Blooming $100
<div class="counter">
<button onclick="minus('bloom')">-</button>
<span id="bloom">0</span>
<button onclick="plus('bloom')">+</button>
</div></div>

<div class="decor">Ojo de gato $200
<div class="counter">
<button onclick="minus('gato')">-</button>
<span id="gato">0</span>
<button onclick="plus('gato')">+</button>
</div></div>

<div class="decor">Relieve $500
<div class="counter">
<button onclick="minus('relieve')">-</button>
<span id="relieve">0</span>
<button onclick="plus('relieve')">+</button>
</div></div>

<div class="decor">Strass $100
<div class="counter">
<button onclick="minus('strass')">-</button>
<span id="strass">0</span>
<button onclick="plus('strass')">+</button>
</div></div>

</div>

<button class="calc" onclick="calc()">Calcular 💅</button>

<div class="total" id="total">$0</div>

</div>

<script>

let base=0;

const prices={
glitter:200,
frances:200,
bloom:100,
gato:200,
relieve:500,
strass:100
};

function selectTech(el,name,price,show){

document.querySelectorAll('.option').forEach(o=>o.classList.remove('active'));
el.classList.add('active');

base=price;

document.getElementById('deco').style.display = show ? 'block':'none';
}

function plus(id){
document.getElementById(id).innerText++;
}

function minus(id){
let el=document.getElementById(id);
if(el.innerText>0) el.innerText--;
}

function calc(){

let total=base;

for(let k in prices){
total += document.getElementById(k).innerText * prices[k];
}

document.getElementById('total').innerText="$"+total;
}

</script>

</body>
</html>
